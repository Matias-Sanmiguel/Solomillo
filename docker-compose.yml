services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solomillo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solomillo}
      POSTGRES_DB: ${POSTGRES_DB:-solomillo}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solomillo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solomillo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solomillo}
      POSTGRES_DB: ${POSTGRES_DB:-solomillo}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-32-chars-min}
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - models_data:/code/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/eventos
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  models_data:
