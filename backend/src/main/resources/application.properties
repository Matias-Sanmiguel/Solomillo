spring.application.name=solomillo
server.port=8000

spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:5432/${POSTGRES_DB:solomillo}
spring.datasource.username=${POSTGRES_USER:solomillo}
spring.datasource.password=${POSTGRES_PASSWORD:solomillo}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.redis.url=${REDIS_URL:redis://redis:6379}

app.jwt.secret=${JWT_SECRET:dev-secret-change-me-32-chars-min}
app.jwt.expiration-ms=86400000

app.models-dir=${MODELS_DIR:/code/models}
